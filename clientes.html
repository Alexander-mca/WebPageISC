<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vida Silvestre GT</title>
    <link href="../styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
         table {
    border-collapse: collapse;
    width: 100%;
  }
  tr {
    background-color: #4CAF50; /* Green header */
    color: white;              /* White text */
  }
  td {
    background-color: #6bb674; /* Light gray cells */
    color: #333333;            /* Dark charcoal text */
    border: 1px solid #55b079;    /* Light gray borders */
  }
    </style>
  </head>
  <body style="background-color: #d56f58;">
    <!--Desde aca empieza la navegacion-->
    <div id="menu-container"></div>
<!--Termina navegacion-->
<!-- Comienza pagina -->
    <div class="container-fluid">
        <div class="container-fluid">
            <div   class="border border-light px-2 mx-2 border" style="background-color: antiquewhite;" id="aves-container"> </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Carga el navbar en todas las páginas
        fetch('menu.html')
        .then(response => response.text())
        .then(html => {
            document.getElementById('menu-container').innerHTML = html;
        });
    </script>
    <script src="./src/scripts/clientes.js"></script>
    <footer id="footer-container">

    </footer>
    <script src="src/scripts/footer.js"></script>
  </body>
</html>
