<div class="card" style="background-color:rgb(143, 190, 208);">
  <div class="card-header">
    <div class="d-flex flex-row mb-3">
      <div class="p-2">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Escudo_de_la_universidad_Mariano_G%C3%A1lvez_Guatemala.svg/3840px-Escudo_de_la_universidad_Mariano_G%C3%A1lvez_Guatemala.svg.png?utm_source=es.wikipedia.org&utm_campaign=index&utm_content=thumbnail" height="40px">
      
      </div>
      <div class="p-2">
        <p class="fs-4 fw-lighter align-middle fw-bold">Universidad Mariano Galvez</p>
      </div>
    </div>
  </div>
  <div class="card-body">
    <figure>
      <blockquote class="blockquote">
        <p class="fs-1 text-secundary fst-italic fw-bold">"Conocereis la verdad y la verdad os hara libres"</p>
      </blockquote>
      
        <div class="d-flex flex-row mb-3">
            <div class="p-2">
            <button type="button" id="facebook" class="btn"> 
              <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/04/Facebook_f_logo_%282021%29.svg/960px-Facebook_f_logo_%282021%29.svg.png" alt="" width="30px" height="30px">
            </button>
            </div>
            <div class="p-2">
              <button type="button" id="instagram" class="btn"> 
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/500px-Instagram_icon.png" alt="" width="30px" height="30px">
            </button>
            </div>
            <div class="p-2">
              <button type="button" id="tiktok" class="btn"> 
              <img src="https://images.icon-icons.com/3041/PNG/512/tiktok_logo_icon_189233.png" alt="" width="35px" height="35px">
            </button>
            </div>
        </div>
    </figure>
  </div>
</div>

<script>
  const b_fb = document.getElementById("facebook");
  b_fb.onclick = function(){
    window.open("https://www.facebook.com/u.marianogalvez",'_blank');
  };
  const b_inst = document.getElementById("instagram");
  b_inst.onclick = function(){
    window.open("https://www.instagram.com/marianogalvez",'_blank');
  };
  const b_tik = document.getElementById("tiktok");
  b_tik.onclick = function(){
    window.open("https://www.tiktok.com/@u.marianogalvez", '_blank');
  };
</script>
